version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stdf
      POSTGRES_USER: stdf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stdf_dev_2024}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stdf -d stdf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
