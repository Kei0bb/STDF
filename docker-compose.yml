version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: stdf-clickhouse
    profiles: [clickhouse]   # opt-in: docker compose up -d --profile clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: stdf
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CH_HTTP_PORT:-8123}:8123"   # HTTP interface (clickhouse-connect)
      - "${CH_TCP_PORT:-9000}:9000"    # Native TCP (DBeaver, etc.)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:16-alpine
    container_name: stdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stdf
      POSTGRES_USER: stdf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stdf_dev_2024}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stdf -d stdf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clickhouse_data:
    driver: local
  postgres_data:
    driver: local
